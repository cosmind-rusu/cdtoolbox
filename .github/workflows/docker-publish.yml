name: Build and publish cdtoolbox

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ⚙️ Activar buildx (multi-platform si quieres en futuro)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login en GHCR (GitHub Container Registry)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔐 Login en Docker Hub (IMPORTANTE: usar secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🏷️ Generar tags automáticas
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/cosmind-rusu/cdtoolbox
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cdtoolbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=sha

      # 🐳 Build + push a ambos registries
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}